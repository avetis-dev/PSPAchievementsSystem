# PSPAchievementsNG 1.0.0
# Copy this file to:
# ms0:/SEPLUGINS/PSPAchievementsNG/config.ini
# Restart the game after changing it.

[general]
enabled = 1
logging = 1

[notifications]
enabled = 1
startup = 1
duration_ms = 4000
startup_duration_ms = 2500

[audio]
enabled = 1
volume = 100
startup_sound = 1
unlock_sound = 1

[menu]
enabled = 1
hotkey = L+R+SELECT
hold_ms = 400
show_badges = 1

[performance]
# auto: adaptive only for heavy packages such as GTA
# full: evaluate every achievement every tick; highest CPU usage
# adaptive: force distributed evaluation for every game
mode = auto
